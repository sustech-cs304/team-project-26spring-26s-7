# =================================================================
# audit.itsmappin.top —— ICP 备案前测试模式（端口 8443）
#
# ⚠️ 这个配置和 audit.itsmappin.top.prod.conf 互斥，二选一安装。
#    install.sh 默认装这个；备案下来后跑 enable-production.sh 切到 prod。
#
# 为什么是 8443？华为云未备案域名只拦 80/443 默认 Web 端口，
# 非标端口不拦。证书签的是域名，跟端口无关，所以 https://audit.itsmappin.top:8443
# 一样能正常 TLS 握手 + 证书校验通过。
#
# 路径路由完全跟 prod 一致；只是不监听 80/443，没有 HSTS（避免浏览器
# 把临时测试地址固化为 HTTPS 强制）。
# =================================================================


# ---- 上游池：每个后端服务一组 -----------------------------------
upstream ai_relay         { server 127.0.0.1:8000; keepalive 16; }
upstream share_service    { server 127.0.0.1:8001; keepalive 16; }
upstream sensitive_filter { server 127.0.0.1:9100; keepalive 16; }
upstream picture_check    { server 127.0.0.1:9200; keepalive 16; }


# ---- 限流区 -----------------------------------------------------
limit_req_zone $binary_remote_addr zone=ai_zone:10m       rate=10r/s;
limit_req_zone $binary_remote_addr zone=share_zone:10m    rate=20r/s;
limit_req_zone $binary_remote_addr zone=filter_zone:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=censor_zone:10m   rate=15r/s;
limit_req_zone $binary_remote_addr zone=viewer_zone:10m   rate=50r/s;


# ---- HTTPS 测试端口 8443 ---------------------------------------
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name audit.itsmappin.top;

    # ---- TLS ------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/audit.itsmappin.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/audit.itsmappin.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ---- 安全头（测试模式不加 HSTS，避免污染浏览器 cache） ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' https:; frame-ancestors 'self';" always;
    # 加一个测试模式的可见标记，便于排查
    add_header X-Deploy-Mode "pre-icp-test" always;

    # ---- 基本调优 -------------------------------------------
    server_tokens off;
    client_max_body_size 25m;
    client_body_buffer_size 256k;
    keepalive_timeout 75s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;
    proxy_buffering off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/css text/javascript application/javascript text/plain image/svg+xml;

    access_log /var/log/nginx/audit.access.log combined buffer=32k flush=10s;
    error_log  /var/log/nginx/audit.error.log warn;


    # ====================================================
    # 路由表（跟 prod.conf 完全相同）
    # ====================================================

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"audit.itsmappin.top","tier":"nginx","mode":"pre-icp-test"}';
    }

    location = /docs        { proxy_pass http://picture_check/docs; }
    location = /openapi.json { proxy_pass http://picture_check/openapi.json; }


    # ===== 1. ai-relay (:8000) ==========================
    location /v1/ {
        limit_req zone=ai_zone burst=20 nodelay;
        client_max_body_size 15m;
        proxy_read_timeout 120s;
        proxy_pass http://ai_relay;
    }
    location = /health/ai { proxy_pass http://ai_relay/health; access_log off; }


    # ===== 2. share-service (:8001) =====================
    location /api/ {
        limit_req zone=share_zone burst=40 nodelay;
        proxy_pass http://share_service;
    }
    location ~ ^/(s|s3d|smap|sreplay)/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /share/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /cache/ {
        proxy_pass http://share_service;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status;
    }
    location /assets/ { proxy_pass http://share_service; }
    location /static/ { proxy_pass http://share_service; }
    location = /health/share { proxy_pass http://share_service/health; access_log off; }


    # ===== 3. sensitive-filter (:9100) ==================
    location /filter/ {
        limit_req zone=filter_zone burst=60 nodelay;
        rewrite ^/filter/(.*)$ /$1 break;
        proxy_pass http://sensitive_filter;
    }
    location = /health/filter { proxy_pass http://sensitive_filter/health; access_log off; }


    # ===== 4. picture-check (:9200) =====================
    location /censor/ {
        limit_req zone=censor_zone burst=30 nodelay;
        client_max_body_size 12m;
        rewrite ^/censor/(.*)$ /$1 break;
        proxy_pass http://picture_check;
    }
    location = /health/censor { proxy_pass http://picture_check/health; access_log off; }


    location / {
        return 404 '{"detail":"route_not_found","domain":"audit.itsmappin.top","mode":"pre-icp-test"}';
        default_type application/json;
    }
}
