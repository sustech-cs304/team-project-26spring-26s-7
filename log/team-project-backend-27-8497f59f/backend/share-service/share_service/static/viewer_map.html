<!--
  ItsMapPin 分享查看页 — Vue 3 + AMap (高德) 地图版

  编辑指引：
    A. <style> 块             —— 配色、地图高度、节点列表样式
    B. initMap(nodes)         —— 地图初始化、marker、路线
    C. mapStyle               —— 想换主题改 'amap://styles/...' 那行
    D. flyToNode(idx)         —— 点击右侧节点列表时的飞行行为
    E. createApp({ template }) —— 整页骨架

  地图：高德 (AMap) JS API v2.0 — 服务端注入 key + securityCode。
  路由：本页面挂在 /smap/{code}.{sig}，路由代码在
        share_service/routers/viewer.py。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ItsMapPin · 分享 · 地图</title>
  <link rel="preconnect" href="https://webapi.amap.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- v1.0.6：AMap (高德) JS API。jscode 必须先于 API script 注入。 -->
  <script>
    window._AMapSecurityConfig = { securityJsCode: '{{AMAP_SECURITY_CODE}}' };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key={{AMAP_KEY}}"></script>

  <script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3.4.27/dist/vue.esm-browser.prod.js"
    }
  }
  </script>

  <style>
    /* ===== A. 配色 / 排版 ===== */
    :root {
      --bg:        #0a0a0f;
      --bg-card:   linear-gradient(145deg, rgba(40,40,55,0.85), rgba(20,20,30,0.95));
      --text:      #e8e8ed;
      --text-soft: #c8c8d0;
      --text-mute: #86868b;
      --accent:    #6366f1;
      --warm:      #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* === v0.8.1 长文本 / 长 URL 防溢出 ===
       .item 是 grid template "32px 1fr"，1fr 列默认最小宽度=内容宽度，
       遇到长串会撑破。改成 minmax(0, 1fr) 才能真正收缩。 */
    html, body { overflow-x: hidden; max-width: 100%; }
    body, h1, h2, h3, p, span {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    img { max-width: 100%; }
    main, .meta { min-width: 0; }
    .item > * { min-width: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* —— Hero —— */
    .hero {
      text-align: center;
      padding: 32px 16px 20px;
    }
    .hero h1 {
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #a0a0a8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .date-range { margin-top: 8px; color: var(--text-mute); font-size: 14px; }

    /* —— Map —— */
    #map {
      width: 100%;
      height: 60vh;
      min-height: 380px;
      background: #1a1a25;
    }
    /* AMap 自身控件：logo / 版权 在右下，淡化即可 */
    .amap-logo, .amap-copyright { opacity: 0.5; }
    .amap-container { background: #1a1a25; }

    /* 自定义节点 marker（数字胶囊）—— 改这里换图标样式 */
    .pin {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--warm), #f59e0b);
      color: #1a1a1f;
      font-weight: 700; font-size: 14px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
      border: 2px solid #fff;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .pin:hover { transform: rotate(-45deg) scale(1.15); }
    .pin span { transform: rotate(45deg); }
    .pin.active {
      background: linear-gradient(135deg, #fff, #e8e8ed);
      box-shadow: 0 6px 22px rgba(251,191,36,0.5);
    }

    /* AMap InfoWindow 暗色化（覆盖默认白底） */
    .amap-info-content {
      background: linear-gradient(145deg, #1a1a25, #25252f) !important;
      color: var(--text) !important;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      padding: 14px 16px !important;
    }
    .amap-info-content strong { font-size: 15px; }
    .amap-info-content small { color: var(--text-mute); }
    .amap-info-content p { margin-top: 6px; color: var(--text-soft); font-size: 13px; }
    .amap-info-sharp { display: none; }   /* 隐藏默认白色三角尾 */
    .amap-info-close { color: var(--text-mute) !important; }

    /* —— 节点列表 —— */
    main {
      max-width: 720px; margin: 0 auto;
      padding: 24px 16px 80px;
    }
    .section-title {
      font-size: 14px; color: var(--text-mute);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .item {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);  /* 0 = 第二列允许收缩 */
      gap: 14px;
      align-items: start;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.3s;
    }
    .item:hover {
      transform: translateX(4px);
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.12);
    }
    .item.active {
      border-color: var(--warm);
      box-shadow: 0 8px 24px rgba(251,191,36,0.18);
    }
    .item .num {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--warm), #f59e0b);
      color: #1a1a1f;
      font-weight: 700;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .item h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .item .meta {
      display: flex; flex-wrap: wrap; gap: 6px;
      font-size: 12px; color: var(--text-mute);
      margin-bottom: 6px;
    }
    .item .meta .mood {
      background: linear-gradient(135deg, var(--warm), #f59e0b);
      color: #1a1a1f; font-weight: 600;
      padding: 1px 8px; border-radius: 6px;
    }
    .item p { color: var(--text-soft); font-size: 13px; }

    /* === v0.9.1 节点正文展开/收起 === */
    .item .content-block { width: 100%; }
    .item .content {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
      color: var(--text-soft);
      font-size: 13px;
    }
    .item .content.expanded { -webkit-line-clamp: unset; display: block; }
    .item .toggle-content {
      background: none; border: none;
      color: #a5b4fc; cursor: pointer;
      padding: 4px 0; font-size: 12px;
      font-weight: 500;
    }
    .item .toggle-content.hidden { display: none; }

    footer {
      text-align: center; padding: 24px 16px;
      color: #6e6e73; font-size: 12px;
      display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 20px;
    }
    .state {
      text-align: center; padding: 100px 16px;
      color: var(--text-mute);
    }
    .state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="app">
    <div class="state"><div class="icon">⏳</div>加载中…</div>
  </div>

<script type="module">
import { createApp, ref, computed, onMounted, nextTick } from 'vue';

let amapMap = null;
let markerObjs = [];

// ===== B. 初始化 AMap (高德) 地图 =====
// AMap 注意点：经纬度顺序 [lng, lat]（与 Leaflet 翻转）
function initMap(nodes) {
  const coords = nodes
    .map((n, i) => ({ n, i }))
    .filter(({ n }) => typeof n.lat === "number" && typeof n.lng === "number");
  if (!coords.length) return;

  // ===== C. 地图样式（想换主题改这里）=====
  // 备选：amap://styles/normal | dark | light | whitesmoke | grey | macaron
  amapMap = new AMap.Map("map", {
    mapStyle: "amap://styles/dark",
    zoom: 11,
    zooms: [3, 19],
    showLabel: true,
  });

  // —— Markers + InfoWindow ——
  markerObjs = coords.map(({ n, i }, k) => {
    const m = new AMap.Marker({
      position: [n.lng, n.lat],
      content: `<div class="pin"><span>${k + 1}</span></div>`,
      offset: new AMap.Pixel(-16, -32),
      anchor: "top-left",
      zIndex: 100 + k,
    });
    amapMap.add(m);

    const safeTitle = (n.title || "").replace(/[<>&]/g, c =>
      ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
    const safePoi   = (n.poiName || "").replace(/[<>&]/g, c =>
      ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
    const safeContent = (n.content || "").replace(/[<>&]/g, c =>
      ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
    const html = `
      <strong>${k + 1}. ${safeTitle}</strong><br>
      ${safePoi ? `<small>📍 ${safePoi}</small>` : ""}
      ${safeContent ? `<p>${safeContent}</p>` : ""}
    `;
    const infoWin = new AMap.InfoWindow({
      content: html,
      offset: new AMap.Pixel(0, -32),
      isCustom: false,
    });
    m.on("click", () => infoWin.open(amapMap, [n.lng, n.lat]));
    return { marker: m, info: infoWin, originalIdx: i, position: [n.lng, n.lat] };
  });

  // —— Polyline 路线 ——
  if (coords.length >= 2) {
    const path = coords.map(({ n }) => [n.lng, n.lat]);
    amapMap.add(new AMap.Polyline({
      path,
      strokeColor: "#6366f1",
      strokeWeight: 3,
      strokeOpacity: 0.7,
      strokeStyle: "dashed",
      strokeDasharray: [6, 8],
      lineJoin: "round",
    }));
  }

  // —— Fit view ——
  amapMap.setFitView(markerObjs.map(o => o.marker), false, [50, 50, 50, 50], 11);
}

// ===== D. 飞行到指定节点 =====
function flyToNode(node, idx) {
  if (!amapMap || typeof node.lat !== "number") return;
  amapMap.setZoomAndCenter(12, [node.lng, node.lat], false, 1000);
  const found = markerObjs.find(m => m.originalIdx === idx);
  if (found) {
    setTimeout(() => found.info.open(amapMap, found.position), 1100);
  }
}

// ===== E. Vue 应用 =====
createApp({
  setup() {
    const state = ref({ kind: "loading" });
    const activeIdx = ref(-1);

    onMounted(async () => {
      const m = location.pathname.match(/\/smap\/([^/]+)$/);
      if (!m) {
        state.value = { kind: "error", icon: "⚠️", msg: "链接格式错误" };
        return;
      }
      try {
        const r = await fetch(`/api/share/${m[1]}`,
          { headers: { Accept: "application/json" } });
        if (r.status === 404) {
          state.value = { kind: "error", icon: "🔗", msg: "链接已失效或已被撤销" };
          return;
        }
        if (r.status === 429) {
          state.value = { kind: "error", icon: "⏱️", msg: "访问太频繁，请稍后再试" };
          return;
        }
        if (!r.ok) {
          state.value = { kind: "error", icon: "⚠️", msg: `加载失败（${r.status}）` };
          return;
        }
        const data = await r.json();
        state.value = { kind: "ok", data };
        document.title = `${data.snapshot?.trip?.name || "ItsMapPin 分享"} · ItsMapPin`;
        await nextTick();
        initMap(sortedNodes.value);

        // v0.9.1: 节点正文展开/收起
        document.querySelectorAll(".item .content-block").forEach(block => {
          const c = block.querySelector(".content");
          const b = block.querySelector(".toggle-content");
          if (!c || !b) return;
          requestAnimationFrame(() => {
            if (c.scrollHeight > c.clientHeight + 1) {
              b.classList.remove("hidden");
            }
          });
          b.onclick = () => {
            const isExp = c.classList.toggle("expanded");
            b.textContent = isExp ? "收起" : "展开";
          };
        });
      } catch (e) {
        state.value = { kind: "error", icon: "⚠️", msg: "网络错误：" + e.message };
      }
    });

    const trip      = computed(() => state.value.data?.snapshot?.trip || {});
    const expireAt  = computed(() => state.value.data?.expireAt);
    const viewCount = computed(() => state.value.data?.viewCount);
    const sortedNodes = computed(() => {
      const ns = state.value.data?.snapshot?.nodes || [];
      return [...ns].sort((a, b) => (a.nodeOrder ?? 0) - (b.nodeOrder ?? 0));
    });

    function onItemClick(node, idx) {
      activeIdx.value = idx;
      flyToNode(node, idx);
    }
    function fmtTime(ms) { return new Date(ms).toLocaleString("zh-CN"); }

    return { state, trip, sortedNodes, expireAt, viewCount,
             activeIdx, onItemClick, fmtTime };
  },
  template: `
    <div v-if="state.kind === 'loading'" class="state">
      <div class="icon">⏳</div>加载中…
    </div>
    <div v-else-if="state.kind === 'error'" class="state">
      <div class="icon">{{ state.icon }}</div>{{ state.msg }}
    </div>
    <template v-else>
      <header class="hero">
        <h1>{{ trip.name || "未命名旅行" }}</h1>
        <p v-if="trip.startDate || trip.endDate" class="date-range">
          {{ trip.startDate || "" }} — {{ trip.endDate || "" }}
        </p>
      </header>
      <div id="map"></div>
      <main>
        <div class="section-title">行程节点（点击聚焦地图）</div>
        <div v-for="(node, idx) in sortedNodes" :key="idx"
             class="item"
             :class="{ active: idx === activeIdx }"
             @click="onItemClick(node, idx)">
          <div class="num">{{ idx + 1 }}</div>
          <div>
            <h3>{{ node.title || "未命名节点" }}</h3>
            <div class="meta">
              <span v-if="node.poiName">📍 {{ node.poiName }}</span>
              <span v-if="node.mood" class="mood">{{ node.mood }}</span>
            </div>
            <div v-if="node.content" class="content-block" @click.stop>
              <p class="content">{{ node.content }}</p>
              <button class="toggle-content hidden" type="button" @click.stop>展开</button>
            </div>
          </div>
        </div>
        <footer>
          <span>访问 {{ viewCount }} 次</span>
          <span>有效期至 {{ fmtTime(expireAt) }}</span>
        </footer>
      </main>
    </template>
  `,
}).mount("#app");
</script>
</body>
</html>
