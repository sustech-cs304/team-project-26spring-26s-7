# =================================================================
# audit.itsmappin.top —— ItsMapPin 3 个后端服务的统一 HTTPS 入口
#
# 部署到华为云服务器 (139.159.143.195) 的 /etc/nginx/conf.d/ 下
# 配套 SSL 证书：华为云 SSL 证书管理 → 申请免费 DV 证书 → 下载 nginx 版
# 证书放到 /etc/nginx/ssl/audit.itsmappin.top/ 下，重命名/软链为
#   fullchain.pem  ←  *_server.crt
#   privkey.pem    ←  *_server.key
#
# 路径路由（无前缀的端点保持原样，方便前端只改 BASE_URL）：
#   /v1/*                      → ai-relay :8000        AI 文案 / 视觉理解
#   /api/share/*  /api/publish/* /api/v1/share/* /api/v1/auth/*  /api/v1/feedback*
#   /s/*  /s3d/*  /smap/*  /sreplay/*
#   /share/*  /cache/*  /assets/*  /static/*           → share-service :8001
#   /filter/*                  → sensitive-check :9200（rewrite 去前缀，过文本审核）
#   /censor/*                  → sensitive-check :9200（rewrite 去前缀，过图片/文本审核 + AGC 登录）
#   /health                    → nginx 直接 200
#   /docs                      → sensitive-check 的 Swagger UI
#
# v1.2 (2026-05-28 ICP 备案通过后)：
#   - 之前两个独立服务 sensitive-filter (9100) + picture-check (9200) 已合并为 sensitive-check (9200)
#   - 公网入口从 8443 切到标准 443（备案后才能用 80/443）
# =================================================================


# ---- 上游池：每个后端服务一组 -----------------------------------
upstream ai_relay        { server 127.0.0.1:8000; keepalive 16; }
upstream share_service   { server 127.0.0.1:8001; keepalive 16; }
upstream sensitive_check { server 127.0.0.1:9200; keepalive 16; }


# ---- 限流区（与各服务进程内限流叠加，nginx 这层做粗粒度防刷） ----
limit_req_zone $binary_remote_addr zone=ai_zone:10m       rate=10r/s;
limit_req_zone $binary_remote_addr zone=share_zone:10m    rate=20r/s;
limit_req_zone $binary_remote_addr zone=filter_zone:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=censor_zone:10m   rate=15r/s;
limit_req_zone $binary_remote_addr zone=viewer_zone:10m   rate=50r/s;


# ---- HTTP → HTTPS 强制跳转 --------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name audit.itsmappin.top;

    # ACME http-01 验证保留（如果走 certbot 续期）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---- HTTPS 主站 (标准 443) -------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name audit.itsmappin.top;

    ssl_certificate     /etc/nginx/ssl/audit.itsmappin.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/audit.itsmappin.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ---- 应用上架合规要求的安全头 -----------------------------
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP：viewer.html 用了 AMap CDN，所以放开 https: 协议；按需收紧
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # ---- 基本调优 ---------------------------------------------
    server_tokens off;
    client_max_body_size 25m;
    client_body_buffer_size 256k;
    keepalive_timeout 75s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;
    proxy_buffering off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/css text/javascript application/javascript text/plain image/svg+xml;

    access_log /var/log/nginx/audit.access.log combined buffer=32k flush=10s;
    error_log  /var/log/nginx/audit.error.log warn;


    # ====================================================
    # 路由表
    # ====================================================

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"audit.itsmappin.top","tier":"nginx","mode":"prod"}';
    }

    # ---- /docs 转 sensitive-check 的 FastAPI Swagger UI ----
    location = /docs        { proxy_pass http://sensitive_check/docs; }
    location = /openapi.json { proxy_pass http://sensitive_check/openapi.json; }


    # ===== 1. ai-relay (:8000) ==========================
    location /v1/ {
        limit_req zone=ai_zone burst=20 nodelay;
        client_max_body_size 15m;
        proxy_read_timeout 120s;
        proxy_pass http://ai_relay;
    }
    location = /health/ai { proxy_pass http://ai_relay/health; access_log off; }


    # ===== 2. share-service (:8001) =====================
    location /api/ {
        limit_req zone=share_zone burst=40 nodelay;
        proxy_pass http://share_service;
    }
    location ~ ^/(s|s3d|smap|sreplay)/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /share/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /cache/ {
        proxy_pass http://share_service;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status;
    }
    location /assets/ { proxy_pass http://share_service; }
    location /static/ { proxy_pass http://share_service; }
    location = /health/share { proxy_pass http://share_service/health; access_log off; }


    # ===== 3. sensitive-check (:9200) ===================
    # 文本审核
    location /filter/ {
        limit_req zone=filter_zone burst=60 nodelay;
        rewrite ^/filter/(.*)$ /$1 break;
        proxy_pass http://sensitive_check;
    }
    location = /health/filter { proxy_pass http://sensitive_check/health; access_log off; }

    # 图片/文本审核 + AGC 登录
    location /censor/ {
        limit_req zone=censor_zone burst=30 nodelay;
        client_max_body_size 12m;
        rewrite ^/censor/(.*)$ /$1 break;
        proxy_pass http://sensitive_check;
    }
    location = /health/censor { proxy_pass http://sensitive_check/health; access_log off; }


    # ---- 兜底：未匹配的路径 ----------------------------
    location / {
        return 404 '{"detail":"route_not_found","domain":"audit.itsmappin.top"}';
        default_type application/json;
    }
}


# ---- 过渡期：8443 端口保留，便于老前端（main 分支）访问 -------
# 主分支客户端的 AUDIT_BASE 仍指向 https://audit.itsmappin.top:8443
# 备案接入同步完成、所有用户切到新版本前，8443 需要和 443 等价提供完整路由。
# 用户全切到新版本后可以把整段 server 删掉。
#
# 注意：8443 不加 HSTS，避免污染浏览器 cache；其他和 443 完全一致。
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name audit.itsmappin.top;

    ssl_certificate     /etc/nginx/ssl/audit.itsmappin.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/audit.itsmappin.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # 安全头：跟 443 一致，但不加 HSTS（避免浏览器把 :8443 当作 HTTPS-only 入口）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' https:; frame-ancestors 'self';" always;
    add_header X-Deploy-Mode "legacy-port-8443" always;

    server_tokens off;
    client_max_body_size 25m;
    client_body_buffer_size 256k;
    keepalive_timeout 75s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;
    proxy_buffering off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/css text/javascript application/javascript text/plain image/svg+xml;

    access_log /var/log/nginx/audit.access.log combined buffer=32k flush=10s;
    error_log  /var/log/nginx/audit.error.log warn;

    # ====================================================
    # 路由表（与 443 server 完全一致）
    # ====================================================

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"audit.itsmappin.top","tier":"nginx","mode":"legacy-8443"}';
    }

    location = /docs        { proxy_pass http://sensitive_check/docs; }
    location = /openapi.json { proxy_pass http://sensitive_check/openapi.json; }

    # ===== 1. ai-relay (:8000) ==========================
    location /v1/ {
        limit_req zone=ai_zone burst=20 nodelay;
        client_max_body_size 15m;
        proxy_read_timeout 120s;
        proxy_pass http://ai_relay;
    }
    location = /health/ai { proxy_pass http://ai_relay/health; access_log off; }

    # ===== 2. share-service (:8001) =====================
    location /api/ {
        limit_req zone=share_zone burst=40 nodelay;
        proxy_pass http://share_service;
    }
    location ~ ^/(s|s3d|smap|sreplay)/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /share/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /cache/ {
        proxy_pass http://share_service;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status;
    }
    location /assets/ { proxy_pass http://share_service; }
    location /static/ { proxy_pass http://share_service; }
    location = /health/share { proxy_pass http://share_service/health; access_log off; }

    # ===== 3. sensitive-check (:9200) ===================
    location /filter/ {
        limit_req zone=filter_zone burst=60 nodelay;
        rewrite ^/filter/(.*)$ /$1 break;
        proxy_pass http://sensitive_check;
    }
    location = /health/filter { proxy_pass http://sensitive_check/health; access_log off; }

    location /censor/ {
        limit_req zone=censor_zone burst=30 nodelay;
        client_max_body_size 12m;
        rewrite ^/censor/(.*)$ /$1 break;
        proxy_pass http://sensitive_check;
    }
    location = /health/censor { proxy_pass http://sensitive_check/health; access_log off; }

    location / {
        return 404 '{"detail":"route_not_found","domain":"audit.itsmappin.top","port":8443}';
        default_type application/json;
    }
}
