# =================================================================
# audit.itsmappin.top —— ItsMapPin 4 个后端服务的统一 HTTPS 入口
#
# 部署到华为云服务器 (139.159.143.195) 的 /etc/nginx/conf.d/ 下
# 配套 SSL 证书：华为云 SSL 证书管理 → 申请免费 DV 证书 → 下载 nginx 版
#
# 路径路由（无前缀的端点保持原样，方便前端只改 BASE_URL）：
#   /v1/*                      → ai-relay :8000        AI 文案 / 视觉理解
#   /api/share/*  /api/publish/* /api/v1/share/* /api/v1/auth/*
#   /s/*  /s3d/*  /smap/*  /sreplay/*
#   /share/*  /cache/*  /assets/*  /static/*           → share-service :8001
#   /filter/*                  → sensitive-filter :9100（rewrite 去前缀）
#   /censor/*                  → picture-check :9200（rewrite 去前缀）
#   /health                    → nginx 直接 200
#   /docs                      → picture-check 的 Swagger UI（与现有行为一致）
# =================================================================


# ---- 上游池：每个后端服务一组 -----------------------------------
upstream ai_relay        { server 127.0.0.1:8000; keepalive 16; }
upstream share_service   { server 127.0.0.1:8001; keepalive 16; }
upstream sensitive_filter { server 127.0.0.1:9100; keepalive 16; }
upstream picture_check    { server 127.0.0.1:9200; keepalive 16; }


# ---- 限流区（与各服务进程内限流叠加，nginx 这层做粗粒度防刷） ----
limit_req_zone $binary_remote_addr zone=ai_zone:10m       rate=10r/s;
limit_req_zone $binary_remote_addr zone=share_zone:10m    rate=20r/s;
limit_req_zone $binary_remote_addr zone=filter_zone:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=censor_zone:10m   rate=15r/s;
limit_req_zone $binary_remote_addr zone=viewer_zone:10m   rate=50r/s;


# ---- HTTP → HTTPS 强制跳转 --------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name audit.itsmappin.top;

    # ACME http-01 验证保留（如果走 certbot 续期）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---- HTTPS 主站 -------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name audit.itsmappin.top;

    # ---- TLS（证书放到 /etc/nginx/ssl/audit.itsmappin.top/ 下）----
    ssl_certificate     /etc/nginx/ssl/audit.itsmappin.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/audit.itsmappin.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ---- 应用上架合规要求的安全头 -----------------------------
    # HSTS 暂用 6 个月 + includeSubDomains（确认稳定后可加 preload）
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP：viewer.html 用了 AMap CDN，所以放开 https: 协议；按需收紧
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # ---- 基本调优 ---------------------------------------------
    server_tokens off;
    client_max_body_size 25m;         # 图片审核 10MB + 余量
    client_body_buffer_size 256k;
    keepalive_timeout 75s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;
    proxy_buffering off;              # SSE / 流式响应友好

    # ---- gzip ------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/css text/javascript application/javascript text/plain image/svg+xml;

    # ---- 访问日志 --------------------------------------------
    access_log /var/log/nginx/audit.access.log combined buffer=32k flush=10s;
    error_log  /var/log/nginx/audit.error.log warn;


    # ====================================================
    # 路由表
    # ====================================================

    # ---- nginx 顶层健康检查（不打到后端） ---------------
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"audit.itsmappin.top","tier":"nginx"}';
    }

    # ---- /docs 直接路由到 picture-check 的 FastAPI Swagger UI
    # （与你已经在用的现有行为一致） -----------------------
    location = /docs {
        proxy_pass http://picture_check/docs;
    }
    location = /openapi.json {
        proxy_pass http://picture_check/openapi.json;
    }


    # ===== 1. ai-relay (:8000) ==========================
    # 端点：/v1/chat/completions, /v1/chat/completions/image, /v1/models
    location /v1/ {
        limit_req zone=ai_zone burst=20 nodelay;
        # 图片上传需要更长 body / 更长读超时
        client_max_body_size 15m;
        proxy_read_timeout 120s;
        proxy_pass http://ai_relay;
    }

    # AI 服务自己的 /health 可访问，便于探活
    location = /health/ai {
        proxy_pass http://ai_relay/health;
        access_log off;
    }


    # ===== 2. share-service (:8001) =====================
    # 业务 API
    location /api/ {
        limit_req zone=share_zone burst=40 nodelay;
        proxy_pass http://share_service;
    }

    # viewer / 资源（H5 静态 + 二维码 + 海报 + 缓存图）
    location ~ ^/(s|s3d|smap|sreplay)/ {
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /share/ {                 # /share/{shortcode}/qrcode.png /poster.jpg
        limit_req zone=viewer_zone burst=100 nodelay;
        proxy_pass http://share_service;
    }
    location /cache/ {                 # /cache/{shortcode}/{filename}
        proxy_pass http://share_service;
        # 缓存图片可由 nginx 也短暂缓存，减轻后端压力
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status;
    }
    location /assets/ {                # /assets/replay-audio/*.mp3
        proxy_pass http://share_service;
    }
    location /static/ {
        proxy_pass http://share_service;
    }

    location = /health/share {
        proxy_pass http://share_service/health;
        access_log off;
    }


    # ===== 3. sensitive-filter (:9100) ==================
    # 公开路径加 /filter 前缀，nginx rewrite 后转给后端的原始端点
    # 对外：POST /filter/check  →  后端 POST /check
    location /filter/ {
        limit_req zone=filter_zone burst=60 nodelay;
        rewrite ^/filter/(.*)$ /$1 break;
        proxy_pass http://sensitive_filter;
    }
    location = /health/filter {
        proxy_pass http://sensitive_filter/health;
        access_log off;
    }


    # ===== 4. picture-check (:9200) =====================
    # 公开路径加 /censor 前缀，nginx rewrite 后转
    # 对外：POST /censor/check    →  后端 POST /check
    #       POST /censor/text_check →  后端 POST /text_check
    location /censor/ {
        limit_req zone=censor_zone burst=30 nodelay;
        client_max_body_size 12m;     # 百度审核 4MB base64 + 余量
        rewrite ^/censor/(.*)$ /$1 break;
        proxy_pass http://picture_check;
    }
    location = /health/censor {
        proxy_pass http://picture_check/health;
        access_log off;
    }


    # ---- 兜底：未匹配的路径 ----------------------------
    location / {
        return 404 '{"detail":"route_not_found","domain":"audit.itsmappin.top"}';
        default_type application/json;
    }
}
