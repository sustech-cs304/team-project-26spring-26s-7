<!--
  ItsMapPin 分享查看页 — Spec 模式（P08 API 规范 §5.2）
  服务端在渲染时会把数据序列化进 window.__ROUTE_DATA__；
  以及把标题、描述、封面图填到下面的 OG / social meta 标签里。
  详见 routers/viewer.py 的 _render_publish_viewer。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <!--
    社交分享元信息（v0.7）— 让 QQ / 微信 / 微博 / Twitter 在收到 URL 时
    能抓到标题 + 摘要 + 封面图，渲染成卡片预览而不是裸链。
    服务端 routers/viewer.py 在渲染 HTML 时会替换 {{...}} 占位符。
  -->
  <title>{{HTML_TITLE}}</title>
  <meta name="description" content="{{SHARE_DESCRIPTION}}">

  <meta property="og:type"        content="article">
  <meta property="og:title"       content="{{HTML_TITLE}}">
  <meta property="og:description" content="{{SHARE_DESCRIPTION}}">
  <meta property="og:url"         content="{{SHARE_URL}}">
  <meta property="og:image"       content="{{COVER_PHOTO_URL}}">
  <meta property="og:site_name"   content="ItsMapPin">
  <meta property="og:locale"      content="zh_CN">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{HTML_TITLE}}">
  <meta name="twitter:description" content="{{SHARE_DESCRIPTION}}">
  <meta name="twitter:image"       content="{{COVER_PHOTO_URL}}">

  <!-- 微信 JS-SDK 二次分享配置位（运行时按需注入；本期不接 SDK，仅留坑位） -->
  <meta name="wxcard:title"       content="{{HTML_TITLE}}">
  <meta name="wxcard:description" content="{{SHARE_DESCRIPTION}}">
  <meta name="wxcard:image"       content="{{COVER_PHOTO_URL}}">
  <style>
    /* ===== A. 视觉 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* === v0.8.1 长文本 / 长 URL 防溢出 ===
       规范模式 viewer 也是用户文本最多的页面（首屏 SSR fallback h1/p 都
       是用户输入）。长 trip 名 / 长摘要会把 .summary 的 .pill 撑破。 */
    html, body { overflow-x: hidden; max-width: 100%; }
    body, h1, h2, h3, p, span, article {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    img { max-width: 100%; }
    main, .meta, .tags, .photos, .summary { min-width: 0; }
    .summary .pill { min-width: 0; max-width: 100%; }

    /* === v0.9.1 节点正文展开/收起 === */
    .content {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }
    .content.expanded { -webkit-line-clamp: unset; display: block; }
    .toggle-content {
      background: none; border: none;
      color: #a5b4fc; cursor: pointer;
      padding: 4px 0; font-size: 13px;
      font-weight: 500;
    }
    .toggle-content.hidden { display: none; }

    /* === v0.9.2 路线回放入口 + 全屏 iframe overlay === */
    .replay-trigger {
      display: block;
      width: 100%;
      margin: 16px 0 8px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border: 0;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .replay-trigger:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.35);
    }
    .replay-trigger:active { transform: translateY(0); }
    .replay-trigger.hidden { display: none; }
    .replay-trigger .triangle {
      display: inline-block;
      margin-right: 8px;
      transform: translateY(-1px);
    }

    .replay-overlay {
      position: fixed; inset: 0;
      background: #0a0a0f;
      z-index: 1000;
      display: none;
    }
    .replay-overlay.show { display: block; }
    .replay-iframe {
      width: 100%; height: 100%;
      border: 0; display: block;
    }
    .replay-close {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 1010;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 22px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0a0a0f;
      color: #e8e8ed;
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #app { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

    .cover {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 16px;
      background: linear-gradient(135deg, #1a1a25, #2a2a35);
      margin-bottom: 16px;
    }
    header {
      text-align: center;
      padding: 16px 8px 32px;
    }
    header h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #a0a0a8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .summary {
      margin-top: 12px;
      color: #86868b;
      font-size: 14px;
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
    }
    .summary .pill {
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: #a5b4fc;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px;
    }
    .node {
      background: linear-gradient(145deg, rgba(40,40,55,0.85), rgba(20,20,30,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }
    .node h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
    .meta {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 12px; font-size: 13px; color: #86868b;
    }
    .poi::before { content: "📍 "; }
    .mood {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1a1a1f; font-weight: 600;
      padding: 2px 9px; border-radius: 6px; font-size: 12px;
    }
    .content { color: #c8c8d0; margin-bottom: 12px; white-space: pre-wrap; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag {
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      padding: 2px 9px; border-radius: 999px; font-size: 12px;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }
    /* v1.0.6：节点多图改成横滚一行 ——
     *   * flex 一行排，photo 固定宽 160px，aspect-ratio: 4/3，与回放页一致
     *   * scroll-snap-type: x mandatory + scroll-snap-align: start，
     *     滑到下一张能 snap 到位
     *   * 隐藏滚动条（Webkit + Firefox 都隐）
     *   * 一张图时 strip 宽度自适应（auto），不强制让用户横滑 */
    .photos {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .photos::-webkit-scrollbar { display: none; }
    .photos img {
      flex: 0 0 auto;
      width: 160px;
      aspect-ratio: 4/3;
      object-fit: cover; border-radius: 10px;
      background: linear-gradient(135deg, #1a1a25, #2a2a35);
      transition: transform 0.25s;
      scroll-snap-align: start;
    }
    /* 单图：直接铺满父容器宽度，不要留空白；多图保持 160px 横滚 */
    .photos.single img {
      width: 100%; max-width: 360px;
      aspect-ratio: 16/10;
    }
    .photos img:hover { transform: scale(1.04); }
    .photos img.broken {
      background: repeating-linear-gradient(45deg,
        #1a1a25, #1a1a25 10px, #25252f 10px, #25252f 20px);
    }

    footer {
      text-align: center; margin-top: 32px;
      color: #6e6e73; font-size: 12px;
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 24px;
    }
    .state { text-align: center; padding: 80px 16px; color: #86868b; }
    .state .icon { font-size: 56px; margin-bottom: 14px; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="app">
    <!-- v0.7: server-rendered fallback. Crawlers (微信/QQ 抓预览的那些)
         不会执行 JS；JS 启用时下面的 script 会清掉这块换成完整 SPA。-->
    <noscript-or-precrawl>
      <h1 style="font-size:28px;text-align:center;padding:48px 16px 8px;
                 background:linear-gradient(135deg,#fff,#a0a0a8);
                 -webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        {{HTML_TITLE}}
      </h1>
      <p style="text-align:center;color:#86868b;padding:0 24px 32px;">
        {{SHARE_DESCRIPTION}}
      </p>
    </noscript-or-precrawl>
  </div>

  <!-- v0.9.2: 路线回放全屏 overlay。iframe src 由服务端注入；
       allow="autoplay" 让回放页面可以在 user-gesture 触发后播放音乐。 -->
  <div class="replay-overlay" id="replay-overlay">
    <iframe id="replay-iframe" class="replay-iframe"
            src="about:blank"
            data-replay-url="{{REPLAY_URL}}"
            allow="autoplay; fullscreen"
            title="路线回放"></iframe>
    <button class="replay-close" id="replay-close" type="button" aria-label="关闭回放">×</button>
  </div>

  <!-- 服务端注入：如果是真实链接 {{ROUTE_DATA_JSON}} 会被替换；否则保持占位符。 -->
  <script>window.__ROUTE_DATA__ = {{ROUTE_DATA_JSON}};</script>
  <script>
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function showState(icon, msg) {
      document.getElementById("app").innerHTML =
        `<div class="state"><div class="icon">${icon}</div>${esc(msg)}</div>`;
    }

    // ===== C. 单节点卡片 =====
    function nodeCard(node) {
      const photos = (node.photos || []);
      // photos 数组里 375w / 750w 两条都在；按 375w 计数即"实际照片张数"。
      const uniques = photos.filter(p => p.width === 375);
      const photoHtml = photos.length ? `
        <div class="photos${uniques.length === 1 ? ' single' : ''}">
          ${uniques.map(p => {
            const hi = photos.find(q => q.width === 750 && extractIdx(q.url) === extractIdx(p.url));
            const srcset = hi ? `${esc(p.url)} 1x, ${esc(hi.url)} 2x` : esc(p.url);
            return `<img src="${esc(p.url)}" srcset="${srcset}" loading="lazy" alt="" onerror="this.classList.add('broken'); this.removeAttribute('src');">`;
          }).join("")}
        </div>` : "";
      return `
        <article class="node">
          <h2>${esc(node.title || "")}</h2>
          <div class="meta">
            ${node.poiName ? `<span class="poi">${esc(node.poiName)}</span>` : ""}
            ${node.mood ? `<span class="mood">${esc(node.mood)}</span>` : ""}
          </div>
          ${node.content ? `
            <div class="content-block">
              <p class="content">${esc(node.content)}</p>
              <button class="toggle-content hidden" type="button">展开</button>
            </div>` : ""}
          ${(node.tags || []).length
            ? `<div class="tags">${node.tags.map(t => `<span class="tag">#${esc(t)}</span>`).join("")}</div>`
            : ""}
          ${photoHtml}
        </article>
      `;
    }
    function extractIdx(url) {
      // ".../{nodeOrder}_{photoIdx}_{w}w.webp" — group by (nodeOrder, photoIdx)
      const m = String(url).match(/(\d+)_(\d+)_(\d+)w\.webp$/);
      return m ? `${m[1]}_${m[2]}` : url;
    }

    // ===== B. 整页 =====
    function render(d) {
      const nodes = (d.nodes || []).slice().sort(
        (a, b) => (a.nodeOrder ?? 0) - (b.nodeOrder ?? 0));
      const summary = [];
      if (d.totalDistance) summary.push(`${d.totalDistance.toFixed(1)} km`);
      summary.push(`${nodes.length} 个节点`);
      if (d.expiresAt) {
        const dt = new Date(d.expiresAt * 1000);
        summary.push(`有效期至 ${dt.toLocaleString("zh-CN")}`);
      }

      // v0.9.2: 至少有一个节点带坐标才有回放可看；都没坐标就把按钮藏掉
      const hasCoords = nodes.some(n =>
        typeof n.latitude === 'number' && typeof n.longitude === 'number');
      const replayBtnHtml = hasCoords
        ? `<button class="replay-trigger" id="replay-trigger" type="button">
             <span class="triangle">▶</span>路线回放
           </button>`
        : '';

      document.getElementById("app").innerHTML = `
        ${d.coverPhotoUrl ? `<img class="cover" src="${esc(d.coverPhotoUrl)}" alt=""
              onerror="this.classList.add('broken'); this.removeAttribute('src');">` : ""}
        <header>
          <h1>${esc(d.tripName || "未命名旅行")}</h1>
          <div class="summary">
            ${summary.map(s => `<span class="pill">${esc(s)}</span>`).join("")}
          </div>
        </header>
        ${replayBtnHtml}
        <main>
          ${nodes.length
            ? nodes.map(nodeCard).join("")
            : `<div class="state"><div class="icon">📭</div>这次旅行还没有节点</div>`}
        </main>
        <footer>
          <span>ItsMapPin · 旅行分享</span>
        </footer>
      `;
      document.title = `${d.tripName || "ItsMapPin 分享"} · ItsMapPin`;
      wireCollapse();
      wireReplayOverlay();
    }

    /** v0.9.2: 点 "路线回放" → 把回放页面 iframe 进来；× 关闭。
     *  iframe 用 lazy load — 用户没点之前不发请求，省流量。
     *  关闭时把 src 改成 about:blank，停掉 iframe 内的音频和地图渲染，
     *  避免在后台空跑流量和电量。 */
    function wireReplayOverlay() {
      const trigger = document.getElementById("replay-trigger");
      const overlay = document.getElementById("replay-overlay");
      const iframe  = document.getElementById("replay-iframe");
      const closeBtn= document.getElementById("replay-close");
      const replayUrl = iframe ? iframe.dataset.replayUrl : "";
      if (!trigger || !overlay || !iframe || !closeBtn) return;
      // 没注入合法 URL（可能是离线 / 未替换占位符）就不开启功能
      if (!replayUrl || replayUrl.startsWith("{{")) {
        trigger.classList.add("hidden");
        return;
      }
      trigger.onclick = () => {
        iframe.src = replayUrl;
        overlay.classList.add("show");
        document.body.style.overflow = "hidden";
      };
      closeBtn.onclick = () => {
        overlay.classList.remove("show");
        iframe.src = "about:blank";   // 停掉里面的音频 + 状态机
        document.body.style.overflow = "";
      };
      // ESC 退出
      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && overlay.classList.contains("show")) {
          closeBtn.click();
        }
      });
    }

    /** v0.9.1：扫描所有 .content 块，溢出 4 行才显示展开按钮 */
    function wireCollapse() {
      document.querySelectorAll(".content-block").forEach(block => {
        const content = block.querySelector(".content");
        const btn = block.querySelector(".toggle-content");
        if (!content || !btn) return;
        requestAnimationFrame(() => {
          if (content.scrollHeight > content.clientHeight + 1) {
            btn.classList.remove("hidden");
          }
        });
        btn.onclick = () => {
          const isExp = content.classList.toggle("expanded");
          btn.textContent = isExp ? "收起" : "展开";
        };
      });
    }

    const data = window.__ROUTE_DATA__;
    if (!data || typeof data !== "object") {
      showState("🔗", "链接已失效或已被撤销");
    } else {
      render(data);
    }
  </script>
</body>
</html>
