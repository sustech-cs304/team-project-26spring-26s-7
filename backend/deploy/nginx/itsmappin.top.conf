# =================================================================
# itsmappin.top —— ItsMapPin 官网（介绍 + 下载引导 + 备案号）
#
# 部署到华为云服务器 (139.159.143.195) 的 /etc/nginx/conf.d/ 下
# 配套 SSL 证书：单独申请 itsmappin.top 的 DV 证书
# 静态文件目录：/var/www/itsmappin.top/ （由 deploy/static/website/* 同步过去）
# =================================================================

# ---- HTTP → HTTPS 强制跳转 ------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name itsmappin.top www.itsmappin.top;

    # ACME http-01 验证保留
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://itsmappin.top$request_uri;
    }
}

# ---- www 跳到 apex（标准做法，集中 SEO 权重） -----------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.itsmappin.top;

    ssl_certificate     /etc/nginx/ssl/itsmappin.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/itsmappin.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://itsmappin.top$request_uri;
}

# ---- HTTPS 官网主站 -------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name itsmappin.top;

    root /var/www/itsmappin.top;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/itsmappin.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/itsmappin.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 官网的 CSP 更严：不需要 inline eval，CDN 允许（用于 Google Fonts 等）
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline';" always;

    server_tokens off;
    keepalive_timeout 75s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript text/plain image/svg+xml application/xml;

    access_log /var/log/nginx/itsmappin.access.log combined buffer=32k flush=10s;
    error_log  /var/log/nginx/itsmappin.error.log warn;

    # 静态资源缓存 30 天
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|otf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # HTML 不缓存（保证内容更新立即生效）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 主路由
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
